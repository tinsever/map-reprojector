services:
  api:
    build:
      context: .
      dockerfile: backend/Dockerfile
    restart: unless-stopped
    environment:
      FLASK_ENV: production
      FLASK_APP: api_main.py
      PYTHONUNBUFFERED: "1"
      CORS_ORIGINS: ${CORS_ORIGINS:-*}
    expose:
      - "5100"
    volumes:
      - ./Weltkarte.svg:/app/Weltkarte.svg:ro
      - app_uploads:/app/uploads
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5100/api/health/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      - api
    expose:
      - "80"

volumes:
  app_uploads:
