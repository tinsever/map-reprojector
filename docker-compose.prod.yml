services:
  api:
    build:
      context: .
      dockerfile: backend/Dockerfile
    image: carta-api:latest
    ports:
      - "5100:5100"
    volumes:
      - ./Weltkarte.svg:/app/Weltkarte.svg:ro
      - ./uploads:/app/uploads
    environment:
      - FLASK_ENV=production
      - FLASK_APP=api_main.py
      - PYTHONPATH=/app/backend
      - CORS_ORIGINS=${CORS_ORIGINS:-*}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5100/api/health/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - carta-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    image: carta-frontend:latest
    ports:
      - "80:80"
    depends_on:
      - api
    restart: unless-stopped
    networks:
      - carta-network

networks:
  carta-network:
    driver: bridge
