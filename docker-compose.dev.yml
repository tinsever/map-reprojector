services:
  api:
    build:
      context: .
      dockerfile: backend/Dockerfile
    ports:
      - "5100:5100"
    volumes:
      - ./Weltkarte.svg:/app/Weltkarte.svg:ro
      - ./uploads:/app/uploads
      - ./backend:/app/backend  # Mount backend in place so imports match production
    environment:
      - FLASK_ENV=development
      - FLASK_APP=api_main.py
      - FLASK_DEBUG=1
      - PYTHONPATH=/app/backend
      - CORS_ORIGINS=http://localhost:5173,http://localhost
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5100/api/health/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - carta-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "80:80"
    depends_on:
      - api
    restart: unless-stopped
    networks:
      - carta-network

networks:
  carta-network:
    driver: bridge
